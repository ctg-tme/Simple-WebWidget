<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="referrer" content="no-referrer" />
    <meta
      name="description"
      content="A lightweight, hash-configured web widget for Cisco RoomOS devices."
    />
    <title>RoomOS Web Widget</title>
  </head>
  <body>
    <main class="widget-shell">
      <article class="widget" aria-live="polite" aria-label="Room information">
        <header id="header" class="widget__header" hidden>
          <h1 id="heading" hidden></h1>
          <div id="conditions" class="conditions" aria-label="Local weather and time" hidden>
            <a
              id="weather-source"
              class="conditions__weather"
              target="_blank"
              rel="noopener noreferrer"
              hidden
            >
              <span id="weather-icon" aria-hidden="true"></span>
            </a>
            <span id="temperature" hidden></span>
            <span id="conditions-divider" class="conditions__divider" aria-hidden="true" hidden>·</span>
            <time id="local-time"></time>
          </div>
        </header>

        <section id="info-1" class="info-block" hidden></section>
        <section id="info-2" class="info-block" hidden></section>

        <section id="brandable-block" class="info-block info-block--brandable" hidden>
          <span id="info-3" hidden></span>
          <span id="brand" class="brand" hidden>
            <img id="brand-image" alt="Branding" referrerpolicy="no-referrer" />
          </span>
        </section>

        <section id="configuration-message" class="configuration-message">
          Widget is not configured
        </section>

        <footer id="footer" class="widget__footer">
          <span class="widget__footer-text">
            © <span id="footer-year"></span> Cisco Systems, Inc. || Created by the Collaboration TME team
          </span>
        </footer>
      </article>
    </main>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
