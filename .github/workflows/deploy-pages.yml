name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions: {}

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Test input security controls
        run: npm test
      - name: Build static site
        env:
          VITE_APTABASE_APP_KEY: ${{ secrets.APTABASE_API_KEY }}
        run: |
          if [ -z "${VITE_APTABASE_APP_KEY}" ]; then
            echo "The APTABASE_API_KEY repository secret is required."
            exit 1
          fi
          npm run build
      - name: Verify production browser policy
        run: npm run check:production-security
      - name: Upload site artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Configure GitHub Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
      - name: Verify deployed production bundle
        env:
          DEPLOYED_URL: ${{ steps.deployment.outputs.page_url }}
          DEPLOYMENT_SHA: ${{ github.sha }}
        run: |
          html="$(curl --fail --silent --show-error --retry 5 --retry-delay 5 "${DEPLOYED_URL}?deployment=${DEPLOYMENT_SHA}")"
          grep --fixed-strings 'Content-Security-Policy' <<< "${html}"
          if grep --fixed-strings 'src="/src/main.js"' <<< "${html}"; then
            echo "GitHub Pages served the unbuilt Vite source instead of dist/."
            exit 1
          fi
